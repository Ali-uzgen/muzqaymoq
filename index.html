html, body { height: 100%; margin: 0; }
body { font-family: 'Nunito', sans-serif; }
.app-wrapper { height: 100%; overflow-y: auto; overflow-x: hidden; width: 100%; }

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes floatSlow { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
@keyframes drip { 0%{transform:scaleY(0);opacity:0} 50%{transform:scaleY(1);opacity:1} 100%{transform:scaleY(1.2) translateY(8px);opacity:0} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
@keyframes slideLeft { from{opacity:0;transform:translateX(-40px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideRight { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-3deg)} 75%{transform:rotate(3deg)} }
@keyframes blob { 0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%} 50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%} }

.anim-float { animation: float 3s ease-in-out infinite; }
.anim-float-slow { animation: floatSlow 4s ease-in-out infinite; }
.anim-float-delay { animation: float 3.5s ease-in-out infinite 0.5s; }
.anim-shimmer { background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2s infinite; }
.anim-pulse { animation: pulse 2s ease-in-out infinite; }
.anim-blob { animation: blob 8s ease-in-out infinite; }

.fade-up { opacity: 0; transform: translateY(30px); transition: all 0.7s cubic-bezier(0.16,1,0.3,1); }
.fade-up.visible { opacity: 1; transform: translateY(0); }
.scale-in { opacity: 0; transform: scale(0.85); transition: all 0.6s cubic-bezier(0.16,1,0.3,1); }
.scale-in.visible { opacity: 1; transform: scale(1); }
.slide-left { opacity: 0; transform: translateX(-40px); transition: all 0.7s cubic-bezier(0.16,1,0.3,1); }
.slide-left.visible { opacity: 1; transform: translateX(0); }
.slide-right { opacity: 0; transform: translateX(40px); transition: all 0.7s cubic-bezier(0.16,1,0.3,1); }
.slide-right.visible { opacity: 1; transform: translateX(0); }

.product-card { transition: all 0.4s cubic-bezier(0.16,1,0.3,1); }
.product-card:hover { transform: translateY(-8px) scale(1.02); }
.product-card:hover .card-img { transform: scale(1.1) rotate(5deg); }
.card-img { transition: transform 0.5s cubic-bezier(0.16,1,0.3,1); }

.btn-primary { position: relative; overflow: hidden; transition: all 0.3s ease; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(255,107,107,0.5); }
.btn-primary:active { transform: translateY(0); }

.star-rating { color: #FFD700; }

.nav-link { position: relative; }
.nav-link::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px; background:#FF6B6B; transition:width 0.3s ease; border-radius:2px; }
.nav-link:hover::after { width:100%; }

.lang-btn { transition: all 0.2s ease; }
.lang-btn.active { background: #FF6B6B; color: white; }
.lang-btn:hover:not(.active) { background: #FFE8CC; }

.sticky-order { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; transform: translateY(100%); transition: transform 0.3s ease; }
.sticky-order.show { transform: translateY(0); }

.drip-1, .drip-2, .drip-3 { position: absolute; width: 12px; background: #FF6B6B; border-radius: 0 0 50% 50%; animation: drip 3s ease-in-out infinite; }
.drip-1 { height: 20px; top: -5px; left: 20%; animation-delay: 0s; }
.drip-2 { height: 28px; top: -5px; left: 55%; animation-delay: 1s; }
.drip-3 { height: 16px; top: -5px; left: 80%; animation-delay: 2s; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #FFF3E0; }
::-webkit-scrollbar-thumb { background: #FF6B6B; border-radius: 4px; }

.sprinkle { position: absolute; width: 4px; height: 12px; border-radius: 3px; }
</style>

  { code:'uz', flag:'🇺🇿', label:'UZ' },

  { code:'kg', flag:'🇰🇬', label:'KG' },

const SECTION_IDS = ['home','products','about','reviews','order'];

let currentLang = localStorage.getItem('icedream_lang') || 'uz';
let config = {};

// ===================== DEFAULT CONFIG =====================
const defaultConfig = {
  background_color: '#FFF3E0',
  surface_color: '#FFFFFF',
  text_color: '#5D4037',
  primary_action_color: '#FF6B6B',
  secondary_action_color: '#6D4C41',

  hero_subtext: '',

};

// ===================== RENDER FUNCTIONS =====================
function t() { return T[currentLang] || T.en; }

function renderLangSwitchers() {
  ['langSwitcher','langSwitcherMobile'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = LANGS.map(l =>
      `<button class="lang-btn px-2.5 py-1 rounded-full text-xs font-bold flex items-center gap-1 ${l.code===currentLang?'active':''}" data-lang="${l.code}">${l.flag} ${l.label}</button>`
    ).join('');
    el.querySelectorAll('[data-lang]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentLang = btn.dataset.lang;
        localStorage.setItem('icedream_lang', currentLang);
        renderAll();
      });
    });
  });
}

function renderNav() {
  const labels = t().nav;
  const desktopNav = document.getElementById('desktopNav');
  desktopNav.innerHTML = labels.map((l,i) =>
    `<a href="#${SECTION_IDS[i]}" class="nav-link text-choco-500 font-semibold text-sm hover:text-pink-500 transition-colors">${l}</a>`
  ).join('');
  const mobileNav = document.getElementById('mobileNav');
  mobileNav.innerHTML = labels.map((l,i) =>
    `<a href="#${SECTION_IDS[i]}" class="block py-2 px-3 rounded-lg text-choco-500 font-semibold hover:bg-cream-100 transition-colors mobile-nav-link">${l}</a>`
  ).join('');
  mobileNav.querySelectorAll('.mobile-nav-link').forEach(a => {
    a.addEventListener('click', () => document.getElementById('mobileMenu').classList.add('hidden'));
  });
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  const prods = t().products;
  grid.innerHTML = prods.map((p, i) => `

function applyStyles() {
  const c = config;
  const fontFamily = c.font_family || defaultConfig.font_family;
  const baseSize = c.font_size || defaultConfig.font_size;

  document.querySelectorAll('.font-display').forEach(el => {
    el.style.fontFamily = `${fontFamily}, Baloo 2, cursive`;
  });
  document.querySelectorAll('.font-body, p').forEach(el => {
    el.style.fontFamily = `Nunito, ${fontFamily}, sans-serif`;
  });

  // Apply colors
  document.querySelectorAll('.btn-primary').forEach(el => {
    el.style.backgroundColor = c.primary_action_color || defaultConfig.primary_action_color;
  });
}

function renderAll() {
  renderLangSwitchers();

  renderProducts();

  renderReviews();
  applyText();
  applyStyles();
  lucide.createIcons();
  observeAnimations();

// ===================== SCROLL ANIMATIONS =====================
function observeAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.fade-up,.scale-in,.slide-left,.slide-right').forEach(el => observer.observe(el));
}

// ===================== HEADER SCROLL =====================

const appWrapper = document.getElementById('app');
appWrapper.addEventListener('scroll', () => {
  const y = appWrapper.scrollTop;
  const header = document.getElementById('header');
  header.classList.toggle('shadow-md', y > 50);
  // Sticky mobile order
  const sticky = document.getElementById('stickyOrder');
  sticky.classList.toggle('show', y > 400);
  lastScroll = y;
});

// ===================== MOBILE MENU =====================
document.getElementById('mobileMenuBtn').addEventListener('click', () => {
  document.getElementById('mobileMenu').classList.toggle('hidden');
});

// ===================== SMOOTH SCROLL =====================
document.addEventListener('click', (e) => {
  const a = e.target.closest('a[href^="#"]');
  if (!a) return;
  e.preventDefault();
  const target = document.querySelector(a.getAttribute('href'));
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
});
